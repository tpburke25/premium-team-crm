name: Salesforce → Supabase Sync
 
on:
  schedule:
    # Runs every day at 7:00 AM Eastern (12:00 UTC)
    - cron: '0 12 * * *'
  workflow_dispatch:
    # Also allows manual trigger from GitHub Actions tab
 
jobs:
  sync:
    runs-on: ubuntu-latest
 
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
 
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
 
      - name: Install dependencies
        run: pip install requests
 
      - name: Run Salesforce sync
        env:
          SF_USERNAME:     ${{ secrets.SF_USERNAME }}
          SF_PASSWORD:     ${{ secrets.SF_PASSWORD }}
          SF_INSTANCE_URL: ${{ secrets.SF_INSTANCE_URL }}
          SUPABASE_URL:    ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:    ${{ secrets.SUPABASE_KEY }}
        run: python sync_salesforce.py
