<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Team CRM — Tasks</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0f11;
  --surface: #1a1a1f;
  --surface2: #222228;
  --surface3: #2a2a32;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --text: #f0f0f2;
  --text2: #9090a0;
  --text3: #606070;
  --accent: #ff7a2f;
  --accent2: #ffaa5c;
  --gold: #f5c842;
  --red: #ff6b6b;
  --green: #5ce65c;
  --orange: #ff9f43;
  --radius: 10px;
  --radius-lg: 14px;
}
body.light {
  --bg: #f4f4f6;
  --surface: #ffffff;
  --surface2: #f0f0f3;
  --surface3: #e5e5ea;
  --border: rgba(0,0,0,0.08);
  --border2: rgba(0,0,0,0.14);
  --text: #111113;
  --text2: #4a4a58;
  --text3: #8a8a98;
  --red: #d93025;
  --green: #1a7f37;
  --orange: #cc7a00;
  --gold: #b08800;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* HEADER */
.header { display: flex; align-items: center; justify-content: space-between; padding: 16px 28px; border-bottom: 1px solid var(--border); background: var(--surface); position: sticky; top: 0; z-index: 100; }
.logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
.logo-mark { width: 30px; height: 30px; background: var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 600; color: #fff; }
.logo-text { font-size: 15px; font-weight: 600; letter-spacing: -0.3px; color: var(--text); }
.logo-sub { font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace; }
.header-right { display: flex; align-items: center; gap: 12px; }
.nav-link { padding: 7px 16px; border-radius: 8px; border: 1px solid var(--border2); background: transparent; color: var(--text2); font-size: 13px; font-family: 'DM Sans', sans-serif; cursor: pointer; text-decoration: none; transition: all 0.15s; display: inline-flex; align-items: center; gap: 6px; }
.nav-link:hover { background: var(--surface2); color: var(--text); }
.nav-link.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.user-chip { display: flex; align-items: center; gap: 8px; padding: 6px 12px; background: var(--surface2); border-radius: 20px; border: 1px solid var(--border); position: relative; cursor: pointer; }
.user-avatar { width: 24px; height: 24px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; color: #fff; }
.user-name { font-size: 13px; color: var(--text2); }
.user-dropdown { position: absolute; top: calc(100% + 8px); right: 0; background: var(--surface2); border: 1px solid var(--border2); border-radius: 10px; padding: 6px; min-width: 180px; z-index: 500; box-shadow: 0 8px 24px rgba(0,0,0,0.4); display: none; }
.user-chip.open .user-dropdown { display: block; }
.dropdown-header { padding: 8px 10px 6px; border-bottom: 1px solid var(--border); margin-bottom: 4px; }
.dropdown-email { font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.dropdown-role { font-size: 10px; color: var(--accent); text-transform: uppercase; letter-spacing: 0.05em; margin-top: 2px; }
.dropdown-item { display: flex; align-items: center; gap: 8px; padding: 8px 10px; border-radius: 6px; font-size: 13px; color: var(--text2); cursor: pointer; transition: all 0.15s; border: none; background: none; font-family: 'DM Sans', sans-serif; width: 100%; text-align: left; }
.dropdown-item:hover { background: var(--surface3); color: var(--text); }
.dropdown-item.danger:hover { background: color-mix(in srgb, var(--red) 15%, transparent); color: var(--red); }

/* TOOLBAR */
.toolbar { display: flex; align-items: center; justify-content: space-between; padding: 14px 28px; border-bottom: 1px solid var(--border); gap: 12px; flex-wrap: wrap; }
.toolbar-left { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.search-wrap { position: relative; }
.search-input { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px 8px 34px; font-size: 13px; color: var(--text); font-family: 'DM Sans', sans-serif; width: 220px; outline: none; transition: border 0.15s; }
.search-input:focus { border-color: var(--accent); }
.search-input::placeholder { color: var(--text3); }
.search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--text3); font-size: 14px; }
.filter-select { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; font-size: 13px; color: var(--text2); font-family: 'DM Sans', sans-serif; outline: none; cursor: pointer; }
.filter-select option { background: var(--surface2); color: var(--text); }
.ms-wrap { position: relative; }
.ms-btn { display: flex; align-items: center; gap: 6px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 7px 12px; font-size: 13px; color: var(--text2); font-family: 'DM Sans', sans-serif; cursor: pointer; white-space: nowrap; user-select: none; min-width: 110px; justify-content: space-between; transition: border 0.15s; }
.ms-btn:hover, .ms-btn.active { border-color: var(--accent); color: var(--accent); }
.ms-arrow { font-size: 10px; opacity: 0.5; }
.ms-badge { background: var(--accent); color: #fff; border-radius: 10px; font-size: 10px; padding: 1px 6px; margin-left: 2px; font-weight: 600; }
.ms-dropdown { position: absolute; top: calc(100% + 6px); left: 0; background: var(--surface2); border: 1px solid var(--border2); border-radius: 10px; padding: 6px; min-width: 180px; z-index: 500; box-shadow: 0 8px 24px rgba(0,0,0,0.4); display: none; }
.ms-wrap.open .ms-dropdown { display: block; }
.ms-option { display: flex; align-items: center; gap: 8px; padding: 7px 10px; border-radius: 6px; font-size: 13px; color: var(--text2); cursor: pointer; transition: background 0.1s; }
.ms-option:hover { background: var(--surface3); color: var(--text); }
.ms-option.selected { color: var(--text); }
.ms-check { width: 15px; height: 15px; border: 1px solid var(--border2); border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 10px; flex-shrink: 0; }
.ms-option.selected .ms-check { background: var(--accent); border-color: var(--accent); color: #fff; }
.tab-group { display: flex; background: var(--surface2); border-radius: 8px; border: 1px solid var(--border); overflow: hidden; }
.tab-btn { padding: 7px 16px; font-size: 13px; font-family: 'DM Sans', sans-serif; border: none; background: transparent; color: var(--text3); cursor: pointer; transition: all 0.15s; }
.tab-btn.active { background: var(--accent); color: #fff; }
.stats-bar { display: flex; gap: 16px; flex-wrap: wrap; }
.stat-chip { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text3); }
.stat-chip strong { color: var(--text); font-weight: 500; }
.stat-dot { width: 8px; height: 8px; border-radius: 50%; }

/* LIST */
.list-wrap { padding: 20px 28px; }
.list-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.list-table thead tr { border-bottom: 1px solid var(--border2); }
.list-table th { text-align: left; padding: 10px 14px; font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text3); cursor: pointer; white-space: nowrap; user-select: none; }
.list-table th:hover { color: var(--text2); }
.list-table th.sorted { color: var(--accent); }
.list-table tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; cursor: default; }
.list-table tbody tr:hover { background: var(--surface2); }
.list-table td { padding: 11px 14px; color: var(--text2); }
.list-table td.primary { color: var(--text); font-weight: 500; }
.mono { font-family: 'DM Mono', monospace; font-size: 12px; }
.panel-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 200; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
.panel-overlay.open { opacity: 1; pointer-events: all; }
.detail-panel { position: fixed; right: 0; top: 0; bottom: 0; width: 420px; background: var(--surface); border-left: 1px solid var(--border2); z-index: 201; transform: translateX(100%); transition: transform 0.25s cubic-bezier(0.16,1,0.3,1); overflow-y: auto; }
.detail-panel.open { transform: translateX(0); }
.panel-header { padding: 20px 24px 16px; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--surface); z-index: 10; }
.panel-close { position: absolute; right: 20px; top: 20px; background: var(--surface2); border: 1px solid var(--border); color: var(--text3); width: 28px; height: 28px; border-radius: 6px; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; }
.panel-close:hover { color: var(--text); }
.panel-title { font-size: 17px; font-weight: 600; color: var(--text); margin-bottom: 4px; line-height: 1.3; padding-right: 36px; }
.panel-sub { font-size: 12px; color: var(--text3); font-family: 'DM Mono', monospace; }
.panel-body { padding: 20px 24px; }
.panel-section { margin-bottom: 22px; }
.panel-section-title { font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text3); margin-bottom: 10px; font-weight: 500; }
.panel-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.panel-field { background: var(--surface2); border-radius: 8px; padding: 10px 12px; border: 1px solid var(--border); }
.panel-field.full { grid-column: 1 / -1; }
.pf-label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
.pf-value { font-size: 13px; color: var(--text); line-height: 1.4; }
.pf-value.mono { font-family: 'DM Mono', monospace; font-size: 12px; }
.sf-link { display: inline-flex; align-items: center; gap: 5px; font-size: 12px; color: var(--accent); text-decoration: none; margin-top: 8px; padding: 5px 10px; background: color-mix(in srgb, var(--accent) 12%, transparent); border: 1px solid color-mix(in srgb, var(--accent) 35%, transparent); border-radius: 6px; transition: opacity 0.15s; }
.sf-link:hover { opacity: 0.75; }
.priority-high { color: var(--red); font-weight: 500; }
.priority-low { color: var(--text3); }
.sort-arrow { margin-left: 4px; opacity: 0.5; }

/* CALENDAR */
.cal-wrap { padding: 20px 28px; }
.cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.cal-nav { display: flex; align-items: center; gap: 10px; }
.cal-nav-btn { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; color: var(--text2); padding: 6px 12px; cursor: pointer; font-size: 13px; font-family: 'DM Sans', sans-serif; transition: all 0.15s; }
.cal-nav-btn:hover { background: var(--surface3); color: var(--text); }
.cal-month-label { font-size: 16px; font-weight: 500; color: var(--text); min-width: 160px; text-align: center; }
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; background: var(--border); border-radius: var(--radius); overflow: hidden; }
.cal-day-header { background: var(--surface2); text-align: center; padding: 8px 4px; font-size: 11px; font-weight: 500; color: var(--text3); text-transform: uppercase; letter-spacing: 0.05em; }
.cal-day { background: var(--surface); min-height: 100px; padding: 8px; }
.cal-day.other-month { background: var(--bg); opacity: 0.5; }
.cal-day.today { background: color-mix(in srgb, var(--accent) 8%, var(--surface)); }
.cal-day-num { font-size: 12px; font-family: 'DM Mono', monospace; color: var(--text3); margin-bottom: 6px; }
.cal-day.today .cal-day-num { color: var(--accent); font-weight: 600; }
.cal-pill { font-size: 11px; padding: 3px 6px; border-radius: 4px; margin-bottom: 3px; cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; background: color-mix(in srgb, var(--accent) 15%, transparent); color: var(--accent); border: 1px solid color-mix(in srgb, var(--accent) 25%, transparent); line-height: 1.4; }
.cal-pill.high { background: color-mix(in srgb, var(--red) 15%, transparent); color: var(--red); border-color: color-mix(in srgb, var(--red) 25%, transparent); }
.cal-pill.overdue { background: color-mix(in srgb, var(--red) 15%, transparent); color: var(--red); border-color: color-mix(in srgb, var(--red) 25%, transparent); }
.cal-more { font-size: 11px; color: var(--text3); padding: 2px 4px; }

/* LOADING / LOGIN */
.login-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: flex; align-items: center; justify-content: center; }
.login-box { width: 100%; max-width: 380px; padding: 2rem; }
.login-logo { display: flex; align-items: center; gap: 12px; margin-bottom: 2rem; }
.login-logo-mark { width: 40px; height: 40px; background: var(--accent); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 700; color: #fff; }
.login-logo-text { font-size: 18px; font-weight: 600; color: var(--text); }
.login-logo-sub { font-size: 12px; color: var(--text3); }
.login-title { font-size: 22px; font-weight: 600; margin-bottom: 6px; color: var(--text); }
.login-sub { font-size: 14px; color: var(--text3); margin-bottom: 2rem; }
.login-field { margin-bottom: 14px; }
.login-label { font-size: 12px; color: var(--text3); margin-bottom: 6px; display: block; text-transform: uppercase; letter-spacing: 0.04em; }
.login-input { width: 100%; background: var(--surface2); border: 1px solid var(--border2); border-radius: 8px; padding: 11px 14px; font-size: 14px; color: var(--text); font-family: 'DM Sans', sans-serif; outline: none; transition: border 0.15s; }
.login-input:focus { border-color: var(--accent); }
.login-input::placeholder { color: var(--text3); }
.login-submit { width: 100%; padding: 12px; background: var(--accent); color: #fff; border: none; border-radius: 8px; font-size: 15px; font-weight: 500; font-family: 'DM Sans', sans-serif; cursor: pointer; transition: opacity 0.15s; }
.login-submit:hover { opacity: 0.85; }
.login-submit:disabled { opacity: 0.4; cursor: not-allowed; }
.login-error { font-size: 13px; color: var(--red); margin-top: 10px; text-align: center; min-height: 20px; }
.loading { text-align: center; padding: 80px 20px; color: var(--text3); }
.spinner { width: 28px; height: 28px; border: 2px solid var(--border2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 14px; }
@keyframes spin { to { transform: rotate(360deg); } }
.hidden { display: none !important; }
</style>
</head>
<body>
<script>
// Instantly hide login if session exists — prevents flash
if (localStorage.getItem('crm_session')) {
  document.addEventListener('DOMContentLoaded', function() {
    var overlay = document.getElementById('loginOverlay');
    if (overlay) overlay.style.display = 'none';
  });
}
// Restore theme instantly
if (localStorage.getItem('crm_theme') === 'light') {
  document.documentElement.style.background = '#f4f4f6';
}
</script>

<!-- LOGIN -->

<!-- HEADER -->
<div class="header">

<!-- TOOLBAR -->
<div class="toolbar">

<!-- LIST VIEW -->
<div class="list-wrap" id="listView">

<script>
const SUPABASE_URL = 'https://idbnpxedwpjrflsqweyh.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlkYm5weGVkd3BqcmZsc3F3ZXloIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczNTY3MDYsImV4cCI6MjA5MjkzMjcwNn0.PL7ftdQbTtkCnfFa3Mwo2H3w_uPXuTh_0o75cu3_FLU';

let currentUser = null;
let allTasks = [];
let filteredTasks = [];
let sortCol = 'due_date';
let sortDir = 1;
let calYear = new Date().getFullYear();
let calMonth = new Date().getMonth();
let currentView = 'list';

// ── AUTH ──────────────────────────────────────────
(async function restoreSession() {
  const saved = localStorage.getItem('crm_session');
  if (!saved) return;
  try {
    const session = JSON.parse(saved);
    if (!session.token) return;
    const check = await fetch(`${SUPABASE_URL}/auth/v1/user`, {
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${session.token}` }
    });
    if (!check.ok) {
      if (session.refresh_token) {
        const ref = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=refresh_token`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_KEY },
          body: JSON.stringify({ refresh_token: session.refresh_token })
        });
        if (ref.ok) {
          const newSession = await ref.json();
          session.token = newSession.access_token;
          session.refresh_token = newSession.refresh_token;
          localStorage.setItem('crm_session', JSON.stringify(session));
        } else { localStorage.removeItem('crm_session'); return; }
      } else { localStorage.removeItem('crm_session'); return; }
    }
    currentUser = { token: session.token, email: session.email, sfName: session.sfName, role: session.role };
    setUserUI(session.sfName, session.email, session.role);
    document.getElementById('loginOverlay').style.display = 'none';
    if (session.role !== 'admin') {
      document.getElementById('ownerFilter').style.display = 'none';
    }
    loadTasks();
  } catch(e) { localStorage.removeItem('crm_session'); }
})();

async function doLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  const btn = document.getElementById('loginBtn');
  const errEl = document.getElementById('loginError');
  errEl.textContent = '';
  btn.disabled = true;
  btn.textContent = 'Signing in...';
  try {
    const res = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_KEY },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error_description || data.msg || 'Login failed');
    currentUser = { email, token: data.access_token };
    const profileRes = await fetch(`${SUPABASE_URL}/rest/v1/tbl_users?email=eq.${encodeURIComponent(email)}&select=*`, {
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${data.access_token}` }
    });
    const profiles = await profileRes.json();
    if (!profiles || profiles.length === 0) throw new Error('User profile not found.');
    const profile = profiles[0];
    currentUser.sfName = profile.sf_owner_name;
    currentUser.role = profile.role;
    localStorage.setItem('crm_session', JSON.stringify({
      token: data.access_token, refresh_token: data.refresh_token,
      email, sfName: profile.sf_owner_name, role: profile.role
    }));
    setUserUI(profile.sf_owner_name, email, profile.role);
    document.getElementById('loginOverlay').style.display = 'none';
    if (profile.role !== 'admin') document.getElementById('ownerFilter').style.display = 'none';
    loadTasks();
  } catch(e) {
    errEl.textContent = e.message;
    btn.disabled = false;
    btn.textContent = 'Sign in';
  }
}

function setUserUI(name, email, role) {
  document.getElementById('userAvatar').textContent = name.charAt(0).toUpperCase();
  document.getElementById('userName').textContent = name;
  document.getElementById('dropdownEmail').textContent = email;
  document.getElementById('dropdownRole').textContent = role === 'admin' ? 'Administrator' : 'Sales Rep';
}

function toggleUserMenu() {
  document.getElementById('userChip').classList.toggle('open');
}
document.addEventListener('click', e => {
  const chip = document.getElementById('userChip');
  if (chip && !chip.contains(e.target)) chip.classList.remove('open');
});

function doLogout() {
  currentUser = null;
  localStorage.removeItem('crm_session');
  document.getElementById('loginOverlay').style.display = 'flex';
  document.getElementById('loginEmail').value = '';
  document.getElementById('loginPassword').value = '';
}

function toggleTheme() {
  const isLight = document.body.classList.toggle('light');
  localStorage.setItem('crm_theme', isLight ? 'light' : 'dark');
  document.getElementById('themeToggleBtn').textContent = isLight ? '🌙 Dark mode' : '☀ Light mode';
}
(function restoreTheme() {
  if (localStorage.getItem('crm_theme') === 'light') {
    document.body.classList.add('light');
    const btn = document.getElementById('themeToggleBtn');
    if (btn) btn.textContent = '🌙 Dark mode';
  }
})();

// ── DATA ──────────────────────────────────────────
async function loadTasks() {
  const ownerParam = (currentUser && currentUser.role === 'rep')
    ? `&assigned_to=eq.${encodeURIComponent(currentUser.sfName)}` : '';
  try {
    let all = [], page = 0, pageSize = 1000;
    while (true) {
      const res = await fetch(
        `${SUPABASE_URL}/rest/v1/tbl_tasks?select=*&order=due_date.asc&limit=${pageSize}&offset=${page * pageSize}${ownerParam}`,
        { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${currentUser.token}` } }
      );
      if (!res.ok) break;
      const data = await res.json();
      if (!Array.isArray(data)) break;
      all = all.concat(data);
      if (data.length < pageSize) break;
      page++;
    }
    allTasks = all;
    document.getElementById('loadingMsg').style.display = 'none';
    document.getElementById('taskTable').style.display = 'table';
    populateFilters();
    applyFilters();
  } catch(e) { console.error('Tasks load error:', e); }
}

let selectedTypes = new Set();
let selectedOwners = new Set();

function toggleMs(wrapId) {
  const wrap = document.getElementById(wrapId);
  const isOpen = wrap.classList.contains('open');
  document.querySelectorAll('.ms-wrap.open').forEach(w => w.classList.remove('open'));
  if (!isOpen) wrap.classList.add('open');
}
document.addEventListener('click', e => {
  document.querySelectorAll('.ms-wrap').forEach(w => {
    if (!w.contains(e.target)) w.classList.remove('open');
  });
});

function populateFilters() {
  const types  = [...new Set(allTasks.map(t => t.type).filter(Boolean))].sort();
  const owners = [...new Set(allTasks.map(t => t.assigned_to).filter(Boolean))].sort();

  document.getElementById('typeDropdown').innerHTML = types.map(t => `
    <div class="ms-option ${selectedTypes.has(t) ? 'selected' : ''}" onclick="toggleOption('type','${t}')">
      <div class="ms-check">${selectedTypes.has(t) ? '✓' : ''}</div>${t}
    </div>`).join('');

  document.getElementById('ownerDropdown').innerHTML = owners.map(o => `
    <div class="ms-option ${selectedOwners.has(o) ? 'selected' : ''}" onclick="toggleOption('owner','${o}')">
      <div class="ms-check">${selectedOwners.has(o) ? '✓' : ''}</div>${o}
    </div>`).join('');
}

function toggleOption(kind, val) {
  const set = kind === 'type' ? selectedTypes : selectedOwners;
  if (set.has(val)) set.delete(val); else set.add(val);
  populateFilters();
  updateMsBtnLabel(kind);
  applyFilters();
}

function updateMsBtnLabel(kind) {
  const set = kind === 'type' ? selectedTypes : selectedOwners;
  const label = document.getElementById(kind + 'BtnLabel');
  const btn   = document.getElementById(kind + 'Btn');
  if (set.size === 0) { label.innerHTML = kind === 'type' ? 'All types' : 'All reps'; btn.classList.remove('active'); }
  else if (set.size === 1) { label.innerHTML = [...set][0]; btn.classList.add('active'); }
  else { label.innerHTML = `${kind === 'type' ? 'Types' : 'Reps'} <span class="ms-badge">${set.size}</span>`; btn.classList.add('active'); }
}

function applyFilters() {
  const search = document.getElementById('taskSearch').value.toLowerCase();
  const status = document.getElementById('statusFilter').value;

  filteredTasks = allTasks.filter(t => {
    if (search) {
      const hay = [t.subject, t.account_name, t.contact_name, t.assigned_to, t.type, t.comments]
        .map(v => (v||'').toLowerCase()).join(' ');
      if (!hay.includes(search)) return false;
    }
    if (status === 'open' && t.status === 'Completed') return false;
    if (status === 'Completed' && t.status !== 'Completed') return false;
    if (selectedTypes.size > 0 && !selectedTypes.has(t.type)) return false;
    if (selectedOwners.size > 0 && !selectedOwners.has(t.assigned_to)) return false;
    return true;
  });

  updateStats();
  renderList();
  if (currentView === 'calendar') renderCalendar();
}

// ── DETAIL PANEL ───────────────────────────────────
function openPanel(id) {
  const t = allTasks.find(x => x.activity_id === id);
  if (!t) return;

  document.getElementById('panelTitle').textContent = t.subject || '—';
  document.getElementById('panelSub').textContent = t.account_name || '';

  const sfLink = document.getElementById('panelSFLink');
  if (t.account_id) {
    sfLink.href = `https://fintech.lightning.force.com/lightning/r/Account/${t.account_id}/view`;
    sfLink.style.display = 'inline-flex';
  } else {
    sfLink.style.display = 'none';
  }

  const dv = parseFloat(t.days_since_activity);
  const daysColor = isNaN(dv) ? '' : dv > 30 ? 'color:var(--red)' : dv > 14 ? 'color:var(--orange)' : 'color:var(--green)';

  document.getElementById('panelBody').innerHTML = `
    <div class="panel-section">
      <div class="panel-section-title">Task details</div>
      <div class="panel-grid">
        <div class="panel-field"><div class="pf-label">Type</div><div class="pf-value">${t.type||'—'}</div></div>
        <div class="panel-field"><div class="pf-label">Priority</div><div class="pf-value ${t.priority==='High'?'priority-high':''}">${t.priority||'—'}</div></div>
        <div class="panel-field"><div class="pf-label">Status</div><div class="pf-value" style="${t.status==='Completed'?'color:var(--green)':'color:var(--accent)'}">${t.status||'—'}</div></div>
        <div class="panel-field"><div class="pf-label">Due Date</div><div class="pf-value mono" style="${dateStyle(t)}">${fmtDate(t.due_date)}</div></div>
        <div class="panel-field"><div class="pf-label">Created Date</div><div class="pf-value mono">${fmtDate(t.created_date)}</div></div>
        <div class="panel-field"><div class="pf-label">Days Since Activity</div><div class="pf-value mono" style="${daysColor}">${!isNaN(dv)?dv+'d':'—'}</div></div>
        <div class="panel-field"><div class="pf-label">Assigned To</div><div class="pf-value">${t.assigned_to||'—'}</div></div>
        <div class="panel-field"><div class="pf-label">FTS ID</div><div class="pf-value mono">${t.fts_id||'—'}</div></div>
      </div>
    </div>
    <div class="panel-section">
      <div class="panel-section-title">Account</div>
      <div class="panel-grid">
        <div class="panel-field full"><div class="pf-label">Account Name</div><div class="pf-value">${t.account_name||'—'}</div></div>
        <div class="panel-field"><div class="pf-label">Industry</div><div class="pf-value">${t.industry||'—'}</div></div>
        <div class="panel-field"><div class="pf-label">Accounting Package</div><div class="pf-value">${t.accounting_package||'—'}</div></div>
      </div>
    </div>
    <div class="panel-section">
      <div class="panel-section-title">Contact</div>
      <div class="panel-grid">
        <div class="panel-field full"><div class="pf-label">Contact Name</div><div class="pf-value">${t.contact_name||'—'}</div></div>
      </div>
    </div>
    ${t.comments ? `<div class="panel-section">
      <div class="panel-section-title">Comments</div>
      <div class="panel-field full"><div class="pf-value" style="white-space:pre-wrap;font-size:12px;color:var(--text2);line-height:1.6">${t.comments}</div></div>
    </div>` : ''}
  `;

  document.getElementById('panelOverlay').classList.add('open');
  document.getElementById('detailPanel').classList.add('open');
}

function closePanel() {
  document.getElementById('panelOverlay').classList.remove('open');
  document.getElementById('detailPanel').classList.remove('open');
}

function updateStats() {
  const open = filteredTasks.filter(t => t.status !== 'Completed').length;
  const overdue = filteredTasks.filter(t => {
    if (!t.due_date || t.status === 'Completed') return false;
    return t.due_date.slice(0,10) < new Date().toISOString().slice(0,10);
  }).length;
  document.getElementById('statsBar').innerHTML = `
    <div class="stat-chip"><div class="stat-dot" style="background:var(--accent)"></div><strong>${filteredTasks.length}</strong> tasks</div>
    <div class="stat-chip"><div class="stat-dot" style="background:var(--gold)"></div><strong>${open}</strong> open</div>
    <div class="stat-chip"><div class="stat-dot" style="background:var(--red)"></div><strong>${overdue}</strong> overdue</div>`;
}

function fmtDate(val) {
  if (!val) return '—';
  const d = new Date(val);
  return `${String(d.getUTCMonth()+1).padStart(2,'0')}/${String(d.getUTCDate()).padStart(2,'0')}/${String(d.getUTCFullYear()).slice(-2)}`;
}

function dateStyle(t) {
  if (!t.due_date || t.status === 'Completed') return '';
  const dd = t.due_date.slice(0,10);
  const td = new Date().toISOString().slice(0,10);
  if (dd < td) return 'color:var(--red);font-weight:500';
  if (dd === td) return 'color:var(--gold);font-weight:500';
  return '';
}

function renderList() {
  const sorted = [...filteredTasks].sort((a,b) => {
    let av = a[sortCol] ?? '', bv = b[sortCol] ?? '';
    if (typeof av === 'string') av = av.toLowerCase();
    if (typeof bv === 'string') bv = bv.toLowerCase();
    return av < bv ? -sortDir : av > bv ? sortDir : 0;
  });

  document.getElementById('taskBody').innerHTML = sorted.map(t => {
    const dv = parseFloat(t.days_since_activity);
    const daysStyle = isNaN(dv) ? '' : dv > 30 ? 'color:var(--red)' : dv > 14 ? 'color:var(--orange)' : 'color:var(--green)';
    const daysVal = !isNaN(dv) ? dv + 'd' : '—';
    return `<tr onclick="openPanel('${t.activity_id}')" style="cursor:pointer" title="${(t.comments||'').replace(/"/g,'&quot;')}">
      <td class="mono" style="${dateStyle(t)}">${fmtDate(t.due_date)}</td>
      <td>${t.type || '—'}</td>
      <td class="primary">${t.subject || '—'}</td>
      <td>${t.account_name || '—'}<span style="font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;margin-left:6px">${t.fts_id||''}</span></td>
      <td>${t.contact_name || '—'}</td>
      <td class="mono" style="${daysStyle}">${daysVal}</td>
      <td class="${t.priority === 'High' ? 'priority-high' : t.priority === 'Low' ? 'priority-low' : ''}">${t.priority || '—'}</td>
      <td>${t.assigned_to || '—'}</td>
    </tr>`;
  }).join('');

  document.querySelectorAll('[id^="s-"]').forEach(el => el.textContent = '');
  const arrow = document.getElementById(`s-${sortCol}`);
  if (arrow) arrow.textContent = sortDir === 1 ? '↑' : '↓';
}

function sortBy(col) {
  if (sortCol === col) sortDir *= -1;
  else { sortCol = col; sortDir = 1; }
  renderList();
}

// ── VIEW SWITCH ────────────────────────────────────
function switchView(view) {
  currentView = view;
  const isList = view === 'list';
  document.getElementById('listView').classList.toggle('hidden', !isList);
  document.getElementById('calView').classList.toggle('hidden', isList);
  document.getElementById('tabList').classList.toggle('active', isList);
  document.getElementById('tabCal').classList.toggle('active', !isList);
  if (!isList) renderCalendar();
}

// ── CALENDAR ───────────────────────────────────────
function changeMonth(dir) {
  calMonth += dir;
  if (calMonth > 11) { calMonth = 0; calYear++; }
  if (calMonth < 0)  { calMonth = 11; calYear--; }
  renderCalendar();
}

function goToday() {
  calYear = new Date().getFullYear();
  calMonth = new Date().getMonth();
  renderCalendar();
}

function renderCalendar() {
  document.getElementById('calLabel').textContent =
    new Date(calYear, calMonth, 1).toLocaleDateString('en-US', { month: 'long', year: 'numeric' });

  const today = new Date().toISOString().slice(0,10);
  const firstDay = new Date(calYear, calMonth, 1).getDay();
  const lastDate = new Date(calYear, calMonth + 1, 0).getDate();
  const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

  const tasksByDate = {};
  filteredTasks.forEach(t => {
    if (!t.due_date || t.status === 'Completed') return;
    const d = t.due_date.slice(0,10);
    if (!tasksByDate[d]) tasksByDate[d] = [];
    tasksByDate[d].push(t);
  });

  let html = days.map(d => `<div class="cal-day-header">${d}</div>`).join('');
  for (let i = 0; i < firstDay; i++) html += `<div class="cal-day other-month"></div>`;

  for (let d = 1; d <= lastDate; d++) {
    const dateStr  = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday  = dateStr === today;
    const isOver   = dateStr < today;
    const tasks    = tasksByDate[dateStr] || [];
    const show     = tasks.slice(0, 3);
    const more     = tasks.length - show.length;

    const pills = show.map(t => {
      const cls = t.priority === 'High' ? 'high' : isOver ? 'overdue' : '';
      return `<div class="cal-pill ${cls}" title="${(t.subject||'').replace(/"/g,'&quot;')}">${t.subject||'Task'}</div>`;
    }).join('');

    html += `<div class="cal-day${isToday ? ' today' : ''}">
      <div class="cal-day-num">${d}</div>
      ${pills}
      ${more > 0 ? `<div class="cal-more">+${more} more</div>` : ''}
    </div>`;
  }

  document.getElementById('calGrid').innerHTML = html;
}
</script>
